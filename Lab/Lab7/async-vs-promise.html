<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Promise vs Async Await</title>
</head>

<body>

<h2>เปรียบเทียบ Promise กับ Async/Await</h2>

<button onclick="loadUsersPromise()">โหลดแบบ Promise</button>
<button onclick="loadUsersAsync()">โหลดแบบ Async/Await</button>

<ul id="userList"></ul>

<script>

// API สำหรับทดลอง
const API_URL = "https://jsonplaceholder.typicode.com/users";


// Promise (.then)
function loadUsersPromise(){

    const list = document.getElementById("userList");

    // เรียก API
    fetch(API_URL)

    // แปลง JSON เป็น Object
    .then(res => res.json())

    // แสดงข้อมูลบนหน้าเว็บ
    .then(users => {

        list.innerHTML = "";

        users.forEach(user => {

            const li = document.createElement("li");
            li.textContent = user.name;

            list.appendChild(li);

        });

    });

}



// async / await
async function loadUsersAsync(){

    const list = document.getElementById("userList");

    // เรียก API
    const res = await fetch(API_URL);

    // แปลง JSON เป็น Object
    const users = await res.json();

    list.innerHTML = "";

    users.forEach(user => {

        const li = document.createElement("li");
        li.textContent = user.name;

        list.appendChild(li);

    });

}

</script>

</body>
</html>
