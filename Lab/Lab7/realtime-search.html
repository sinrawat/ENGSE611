<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Real-time Search Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: "Tahoma", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #233647;          /* สีพื้นหลังเข้ม */
      color: #ffffff;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
      color: #35d0c8;              /* สีหัวข้อเขียวอมฟ้า */
    }

    .title-underline {
      width: 260px;
      height: 3px;
      background: #35d0c8;
      margin: 8px auto 24px;
      border-radius: 999px;
    }

    .subtitle {
      font-size: 20px;
      margin-bottom: 36px;
    }

    .card {
      max-width: 800px;
      margin: 0 auto;
      background: #f5f5f5;
      padding: 32px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
      text-align: left;
      color: #333333;
    }

    #searchInput {
      width: 100%;
      padding: 12px 16px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #999;
      outline: none;
    }

    #searchInput:focus {
      border-color: #35d0c8;
      box-shadow: 0 0 0 3px rgba(53,208,200,0.25);
    }

    #results {
      margin-top: 20px;
      padding-left: 20px;
      font-size: 18px;
    }

    #results li {
      margin-bottom: 6px;
    }

    .note {
      margin-top: 28px;
      font-size: 18px;
      color: #ffffff;
    }

    .note b {
      font-weight: 700;
    }
  </style>
</head>
<body>

  <h1>ตัวอย่าง: Real-time Search 🔍</h1>
  <div class="title-underline"></div>
  <div class="subtitle">
    สร้าง Search ที่ค้นหาข้อมูลจาก Array ขณะที่ผู้ใช้กำลังพิมพ์
  </div>

  <div class="card">
    <input
      type="text"
      id="searchInput"
      placeholder="ค้นหาสินค้า... (เช่น iPhone, MacBook)"
    >

    <ul id="results"></ul>
  </div>

  <div class="note">
    เทคนิคสำคัญ: ใช้ <b>Debounce</b> เพื่อลดการค้นหาที่บ่อยเกินไป ทำให้มี Performance ที่ดีขึ้น
  </div>

  <script>
    // ข้อมูลตัวอย่างสินค้า (Array)
    const products = [
      "iPhone 15",
      "iPhone 15 Pro",
      "iPhone 14",
      "MacBook Air M2",
      "MacBook Pro 14\"",
      "iPad Pro 12.9\"",
      "iPad Air",
      "Apple Watch Series 10",
      "AirPods Pro",
      "Magic Keyboard",
      "Magic Mouse",
      "Apple TV 4K"
    ];

    const searchInput = document.getElementById("searchInput");
    const resultsList = document.getElementById("results");

    // ฟังก์ชัน Debounce ทั่วไป
    function debounce(fn, delay) {
      let timerId;
      return function (...args) {
        clearTimeout(timerId);
        timerId = setTimeout(() => {
          fn.apply(this, args);
        }, delay);
      };
    }

    // ฟังก์ชันค้นหาและแสดงผล
    function handleSearch() {
      const query = searchInput.value.trim().toLowerCase();
      resultsList.innerHTML = "";

      if (query === "") {
        return; // ถ้าไม่พิมพ์อะไร ไม่ต้องแสดงอะไร
      }

      const filtered = products.filter(item =>
        item.toLowerCase().includes(query)
      );

      if (filtered.length === 0) {
        const li = document.createElement("li");
        li.textContent = "ไม่พบสินค้า";
        resultsList.appendChild(li);
      } else {
        filtered.forEach(item => {
          const li = document.createElement("li");
          li.textContent = item;
          resultsList.appendChild(li);
        });
      }
    }

    // ห่อฟังก์ชันค้นหาด้วย debounce (เช่น 300 ms)
    const debouncedSearch = debounce(handleSearch, 300);

    // ให้ทำงานขณะพิมพ์ (input event)
    searchInput.addEventListener("input", debouncedSearch);
  </script>

</body>
</html>
